<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" role="img" aria-label="Cloud computing decision platform DRL architecture with parallel encoders and dual-head policy">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f1419"/>
      <stop offset="100%" stop-color="#1a2332"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#2dd4bf"/>
      <stop offset="100%" stop-color="#38bdf8"/>
    </linearGradient>
    <linearGradient id="node" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#243044"/>
      <stop offset="100%" stop-color="#1a2332"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#38bdf8" fill-opacity="0.85"/>
    </marker>
    <marker id="arrow-aux" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2dd4bf" fill-opacity="0.85"/>
    </marker>
  </defs>

  <rect width="800" height="450" fill="url(#bg)"/>

  <g stroke="#ffffff" stroke-opacity="0.04" stroke-width="1">
    <path d="M 0 90 H 800 M 0 180 H 800 M 0 270 H 800 M 0 360 H 800"/>
    <path d="M 100 0 V 450 M 200 0 V 450 M 300 0 V 450 M 400 0 V 450 M 500 0 V 450 M 600 0 V 450 M 700 0 V 450"/>
  </g>

  <ellipse cx="400" cy="228" rx="290" ry="118" fill="none" stroke="url(#accent)" stroke-opacity="0.22" stroke-width="2" stroke-dasharray="8 6"/>

  <!-- Platform observability -->
  <rect x="48" y="192" width="108" height="72" rx="10" fill="url(#node)" stroke="#38bdf8" stroke-opacity="0.55" stroke-width="1.5"/>
  <text x="102" y="218" fill="#94a3b8" font-family="sans-serif" font-size="10" text-anchor="middle" font-weight="600">PLATFORM</text>
  <text x="102" y="236" fill="#e2e8f0" font-family="sans-serif" font-size="10" text-anchor="middle">Observability</text>
  <text x="102" y="252" fill="#64748b" font-family="sans-serif" font-size="8" text-anchor="middle">平台观测</text>

  <!-- Parallel encoders -->
  <rect x="188" y="168" width="98" height="44" rx="8" fill="url(#node)" stroke="#64748b" stroke-width="1.2"/>
  <text x="237" y="188" fill="#e2e8f0" font-family="sans-serif" font-size="9" text-anchor="middle" font-weight="600">MACRO ENC</text>
  <text x="237" y="202" fill="#64748b" font-family="sans-serif" font-size="7" text-anchor="middle">Macro 编码 · parallel</text>

  <rect x="188" y="244" width="98" height="44" rx="8" fill="url(#node)" stroke="#64748b" stroke-width="1.2"/>
  <text x="237" y="264" fill="#e2e8f0" font-family="sans-serif" font-size="9" text-anchor="middle" font-weight="600">MICRO ENC</text>
  <text x="237" y="278" fill="#64748b" font-family="sans-serif" font-size="7" text-anchor="middle">Micro 编码 · parallel</text>

  <!-- BDQ backbone -->
  <rect x="318" y="172" width="156" height="112" rx="12" fill="url(#node)" stroke="url(#accent)" stroke-width="2" filter="url(#glow)"/>
  <text x="396" y="202" fill="#2dd4bf" font-family="sans-serif" font-size="13" text-anchor="middle" font-weight="700">BDQ POLICY</text>
  <text x="396" y="222" fill="#cbd5e1" font-family="sans-serif" font-size="10" text-anchor="middle">Actor-Critic</text>
  <text x="396" y="240" fill="#94a3b8" font-family="sans-serif" font-size="9" text-anchor="middle">shared repr. · 共享表示</text>
  <text x="396" y="258" fill="#64748b" font-family="sans-serif" font-size="8" text-anchor="middle">Dueling / Branching</text>
  <text x="396" y="272" fill="#64748b" font-family="sans-serif" font-size="7" text-anchor="middle">capacity · priority · policy</text>

  <!-- Dual-head outputs -->
  <rect x="506" y="168" width="104" height="44" rx="8" fill="url(#node)" stroke="#64748b" stroke-width="1.2"/>
  <text x="558" y="188" fill="#e2e8f0" font-family="sans-serif" font-size="9" text-anchor="middle" font-weight="600">CONTROL</text>
  <text x="558" y="202" fill="#64748b" font-family="sans-serif" font-size="7" text-anchor="middle">primary · 控制动作 · 主头</text>

  <rect x="506" y="244" width="104" height="44" rx="8" fill="url(#node)" stroke="#2dd4bf" stroke-width="1.5" stroke-dasharray="5 4"/>
  <text x="558" y="264" fill="#2dd4bf" font-family="sans-serif" font-size="9" text-anchor="middle" font-weight="600">PREF ALIGN</text>
  <text x="558" y="278" fill="#64748b" font-family="sans-serif" font-size="7" text-anchor="middle">auxiliary · 偏好对齐 · 辅助网络</text>

  <!-- GPU replay -->
  <rect x="130" y="336" width="540" height="52" rx="8" fill="#111827" stroke="#2dd4bf" stroke-opacity="0.35" stroke-width="1.5"/>
  <text x="160" y="360" fill="#2dd4bf" font-family="sans-serif" font-size="10" font-weight="600">GPU REPLAY BUFFER</text>
  <g fill="#38bdf8" fill-opacity="0.55">
    <rect x="330" y="350" width="28" height="24" rx="3"/>
    <rect x="364" y="350" width="28" height="24" rx="3"/>
    <rect x="398" y="350" width="28" height="24" rx="3"/>
    <rect x="432" y="350" width="28" height="24" rx="3"/>
    <rect x="466" y="350" width="28" height="24" rx="3"/>
    <rect x="500" y="350" width="28" height="24" rx="3"/>
    <rect x="534" y="350" width="28" height="24" rx="3"/>
    <rect x="568" y="350" width="28" height="24" rx="3"/>
  </g>
  <text x="620" y="368" fill="#64748b" font-family="sans-serif" font-size="9">device-local</text>

  <!-- Flow arrows: obs -> parallel encoders -->
  <line x1="156" y1="218" x2="188" y2="190" stroke="#38bdf8" stroke-opacity="0.65" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="156" y1="238" x2="188" y2="266" stroke="#38bdf8" stroke-opacity="0.65" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- encoders -> BDQ -->
  <line x1="286" y1="190" x2="318" y2="208" stroke="#64748b" stroke-opacity="0.8" stroke-width="1.2" marker-end="url(#arrow)"/>
  <line x1="286" y1="266" x2="318" y2="248" stroke="#64748b" stroke-opacity="0.8" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- BDQ -> dual heads -->
  <line x1="474" y1="208" x2="506" y2="190" stroke="#64748b" stroke-opacity="0.8" stroke-width="1.2" marker-end="url(#arrow)"/>
  <line x1="474" y1="248" x2="506" y2="266" stroke="#2dd4bf" stroke-opacity="0.85" stroke-width="1.2" stroke-dasharray="5 4" marker-end="url(#arrow-aux)"/>

  <!-- heads -> replay -->
  <line x1="558" y1="212" x2="558" y2="336" stroke="#64748b" stroke-opacity="0.55" stroke-width="1.2" marker-end="url(#arrow)"/>
  <line x1="558" y1="288" x2="558" y2="336" stroke="#2dd4bf" stroke-opacity="0.65" stroke-width="1.2" stroke-dasharray="5 4" marker-end="url(#arrow-aux)"/>
  <line x1="396" y1="284" x2="396" y2="336" stroke="#2dd4bf" stroke-opacity="0.35" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- Distributed training badge -->
  <rect x="24" y="24" width="132" height="56" rx="8" fill="#111827" stroke="#334155" stroke-width="1"/>
  <text x="40" y="46" fill="#94a3b8" font-family="sans-serif" font-size="9" font-weight="600">RAY JOB</text>
  <text x="40" y="64" fill="#e2e8f0" font-family="sans-serif" font-size="9">Ray Job · DDP · DeepSpeed</text>

  <text x="400" y="430" fill="#64748b" font-family="sans-serif" font-size="11" text-anchor="middle" letter-spacing="0.12em">CLOUD DECISION PLATFORM · STEALTH PILOT</text>
</svg>
