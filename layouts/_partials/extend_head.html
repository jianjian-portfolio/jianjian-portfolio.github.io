{{- partial "seo.html" . }}

<script>
(function () {
  var PREF_KEY = "pref-theme";
  try {
    localStorage.removeItem(PREF_KEY);
  } catch (e) {}

  var html = document.documentElement;
  var pref = null;
  try {
    pref = sessionStorage.getItem(PREF_KEY);
  } catch (e) {}

  if (pref === "light" || pref === "dark") {
    html.dataset.theme = pref;
  } else if (window.matchMedia("(prefers-color-scheme: dark)").matches) {
    html.dataset.theme = "dark";
  } else {
    html.dataset.theme = "light";
  }
})();
</script>

{{- if .IsHome }}
<script>
(function () {
  if (/bot|crawler|spider|googlebot|bingbot|slurp|duckduckbot/i.test(navigator.userAgent)) return;

  var KEY = "site-lang-pref";
  var path = window.location.pathname;
  var isRoot = path === "/" || path === "";
  if (!isRoot) return;

  var pref = localStorage.getItem(KEY);
  if (pref === "zh") {
    window.location.replace("/zh/");
    return;
  }
  if (pref === "en") return;

  var langs = navigator.languages || [navigator.language || ""];
  for (var i = 0; i < langs.length; i++) {
    if (String(langs[i]).toLowerCase().indexOf("zh") === 0) {
      localStorage.setItem(KEY, "zh");
      window.location.replace("/zh/");
      return;
    }
  }
  localStorage.setItem(KEY, "en");
})();
</script>
{{- end }}

<script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js" integrity="sha384-XjKyOOlGwcjNTAIQHIpgOno0Hl1YQqzUOEleOLALmuqehneUG+vnGctmUb0ZY0l8" crossorigin="anonymous"></script>
<script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js" integrity="sha384-+VBxd3r6XgURycqtZ117nYw44OOcIax56Z4dCRWbxyPt0Koah1uHoK0o4+/RRE05" crossorigin="anonymous"
    onload="renderMathInElement(document.body, {
